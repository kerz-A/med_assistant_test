services:
  backend:
    build:
      context: ./backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./.cache/huggingface:/root/.cache/huggingface
      - ./.cache/faster_whisper:/root/.cache/faster_whisper
      - ./.cache/torch:/root/.cache/torch
      - ./.cache/speechbrain:/root/.cache/speechbrain
    networks:
      - app-network

  ollama:
    image: ollama/ollama:latest
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    volumes:
      - ./.cache/ollama:/root/.ollama
    networks:
      - app-network

  frontend:
    build:
      context: ./frontend
    ports:
      - "3000:80"
    restart: on-failure
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    depends_on:
      - backend
    networks:
      - app-network

networks:
  app-network:
    driver: bridge
